<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Primary SEO Meta Tags -->
  <title>Vaper Store | Premium Vape, Glass & Smoking Accessories</title>
  <meta name="title" content="Vaper Store | Premium Vape, Glass & Smoking Accessories" />
  <meta name="description"
    content="Shop 165+ premium vaping products — lighters, torches, glass pipes, grinders, rolling papers, hemp wraps, and more. Free shipping on orders over $75. Authentic products guaranteed." />
  <meta name="keywords"
    content="vape store, glass pipes, lighters, torches, grinders, rolling papers, hemp wraps, smoking accessories, bubblers, bongs, water pipes, hookah, vaporizer" />
  <meta name="author" content="Vaper Store" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#00d4ff" />

  <!-- Canonical -->
  <link rel="canonical" href="https://vaperstore.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="apple-touch-icon" href="/logo.jpg" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vaperstore.com/" />
  <meta property="og:title" content="Vaper Store | Premium Vape, Glass & Smoking Accessories" />
  <meta property="og:description"
    content="Shop 165+ premium vaping products — lighters, torches, glass pipes, grinders, rolling papers, hemp wraps, and more. Free shipping on orders over $75." />
  <meta property="og:image" content="https://vaperstore.com/logo.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Vaper Store" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://vaperstore.com/" />
  <meta name="twitter:title" content="Vaper Store | Premium Vape, Glass & Smoking Accessories" />
  <meta name="twitter:description"
    content="Shop 165+ premium vaping products — lighters, torches, glass pipes, grinders, rolling papers, and more. Free shipping on orders over $75." />
  <meta name="twitter:image" content="https://vaperstore.com/logo.jpg" />

  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Vaper Store",
      "url": "https://vaperstore.com",
      "logo": "https://vaperstore.com/logo.jpg",
      "description": "Premium vape, glass, and smoking accessories store offering 165+ products including lighters, torches, glass pipes, grinders, rolling papers, and hemp wraps.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>

  <!-- JSON-LD Structured Data: WebSite + SearchAction -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Vaper Store",
      "url": "https://vaperstore.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://vaperstore.com/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <!-- JSON-LD Structured Data: Store -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Vaper Store",
      "url": "https://vaperstore.com",
      "image": "https://vaperstore.com/logo.jpg",
      "description": "Premium vape and smoking accessories — glass pipes, lighters, grinders, rolling papers, hemp wraps, and more.",
      "priceRange": "$1 - $200",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Credit Card, Debit Card",
      "hasMap": "https://vaperstore.com/contact"
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
